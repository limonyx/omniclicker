app-id: io.github.omniclicker
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: omniclicker
finish-args:
  # X11 fallback for X11-only sessions. On Wayland, prefer the native Wayland
  # socket instead of granting full X11/XWayland access.
  - --share=ipc
  - --socket=fallback-x11
  
  # Wayland access for native Wayland UI
  - --socket=wayland

  # Wayland click injection currently opens /dev/uinput directly to create a
  # virtual input device. Flatpak's narrower --device=input permission exposes
  # /dev/input/event* but not /dev/uinput, so it is not enough for the current backend.
  - --device=all

  # Allow native KDE Global Shortcuts backend.
  - --talk-name=org.kde.kglobalaccel

  # Allows desktop-specific shortcut backends to run host tools through
  # flatpak-spawn --host: gsettings on GNOME, swaymsg on Sway, and hyprctl on
  # Hyprland. The generic portal backend is still available where supported.
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: omniclicker
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/limonyx/omniclicker.git
        tag: v1.1.1
