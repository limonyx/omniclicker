app-id: io.github.omniclicker
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: omniclicker
finish-args:
  # X11 fallback for X11-only sessions. On Wayland, prefer the native Wayland
  # socket instead of granting full X11/XWayland access.
  - --share=ipc
  - --socket=fallback-x11
  
  # Wayland access for native Wayland UI
  - --socket=wayland

  # Wayland click injection uses Linux input devices: /dev/uinput for the
  # virtual click device, and /dev/input/event* only as the last-resort hotkey
  # fallback. Prefer the narrower input-device grant on Flatpak versions that
  # support it, and keep a conditional all-device fallback only for older
  # Flatpak versions that do not know --device=input.
  - --device-if=all:!has-input-device
  - --device=input

  # Allow native KDE Global Shortcuts backend.
  - --talk-name=org.kde.kglobalaccel

  # Allows desktop-specific shortcut backends to run host tools through
  # flatpak-spawn --host: gsettings on GNOME, swaymsg on Sway, and hyprctl on
  # Hyprland. The generic portal backend is still available where supported.
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: omniclicker
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/limonyx/omniclicker.git
        branch: flatpak
#        tag: v1.0.0
